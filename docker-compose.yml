version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: malamia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: malamia
      POSTGRES_PASSWORD: malamia_secret
      POSTGRES_DB: malamia_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U malamia -d malamia_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
