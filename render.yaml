services:
  - type: web
    name: malamia-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: malamia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://jolly-medovik-9cc8d6.netlify.app
    rootDir: backend

databases:
  - name: malamia-db
    engine: postgres
    plan: free
